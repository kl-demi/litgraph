services:
  arcadedb:
    image: arcadedata/arcadedb:latest
    ports:
      - "2480:2480" # HTTP API / Studio
      - "7688:7687" # bolt (Neo4j service already claims host port 7687)
    environment:
      - JAVA_OPTS=-Darcadedb.server.rootPassword=${ARCADEDB_PASSWORD:-changeme123} -Darcadedb.server.plugins=Bolt:com.arcadedb.bolt.BoltProtocolPlugin
    volumes:
      - arcadedb_data:/home/arcadedb/databases

volumes:
  arcadedb_data:
